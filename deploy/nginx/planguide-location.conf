# Add these locations to the existing server block for myunlimatedlife.top.

location = /plan {
    return 301 /plan/;
}

location /plan/ {
    proxy_pass http://127.0.0.1:8010/plan/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /plan/api/ {
    proxy_pass http://127.0.0.1:8010/plan/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
