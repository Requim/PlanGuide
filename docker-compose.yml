services:
  plan-app:
    build:
      context: .
    container_name: planguide-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/planguide.db}
      PLAN_INVITE_CODE: ${PLAN_INVITE_CODE:-change-me}
      PLAN_COOKIE_SECURE: ${PLAN_COOKIE_SECURE:-true}
    volumes:
      - plan_data:/data

  plan-nginx:
    image: nginx:1.27-alpine
    container_name: planguide-nginx
    restart: unless-stopped
    depends_on:
      - plan-app
    ports:
      - "127.0.0.1:${PLAN_PORT:-8010}:8010"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  plan_data:
