services:
  plan-app:
    build:
      context: .
    container_name: planguide-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////data/planguide.db}
      PLAN_INVITE_CODE: ${PLAN_INVITE_CODE:-change-me}
      PLAN_COOKIE_SECURE: ${PLAN_COOKIE_SECURE:-true}
    ports:
      - "127.0.0.1:${PLAN_PORT:-8010}:8010"
    volumes:
      - plan_data:/data

volumes:
  plan_data:
